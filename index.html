<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' file:">
    <title>Electron Tunes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Drag Area -->
    <div class="drag-area"></div>

    <div class="container">
        <div class="sidebar-trigger"></div>
        <div class="sidebar">
            <h2>Playlists</h2>
            <button id="create-playlist-btn" class="create-playlist-btn">+ New Playlist</button>
            <ul id="playlist-list">
                <li class="active">All Downloads</li>
            </ul>
        </div>
        <div class="main-content">
            <h1>All Downloads</h1>
            <!-- Toolbar / Action Bar -->
            <div class="action-bar">
                <div class="input-wrapper search-wrapper">
                    <span class="input-icon">➕</span>
                    <input type="text" id="youtube-url" placeholder="Add song (Search or URL)...">
                </div>
                <div class="input-wrapper filter-wrapper">
                    <span class="input-icon">🔍</span>
                    <input type="text" id="local-search-input" placeholder="Filter...">
                </div>
            </div>
            <div id="download-status" style="margin-bottom: 20px; font-size: 0.8rem; color: #1db954; height: 1em;">
            </div>

            <div class="song-list-header">
                <span>Title</span>
                <span style="text-align: right;">Duration</span>
            </div>
            <ul id="song-list">
                <!-- Song items will be added here -->
            </ul>
        </div>
    </div>

    <!-- Playback Bar -->
    <div class="playback-bar">
        <div class="playback-info">
            <div id="now-playing">
                <!-- Javascript will inject content here -->
            </div>
        </div>

        <div class="playback-controls">
            <div class="control-buttons-row">
                <button id="shuffle-button" class="control-button" title="Shuffle">🔀</button>
                <button id="prev-button" class="control-button">⏮</button>
                <button id="play-button" class="control-button">▶</button>
                <button id="next-button" class="control-button">⏭</button>
                <button id="repeat-button" class="control-button" title="Repeat">➡️</button>
            </div>
            <div class="playback-progress">
                <span id="current-time">0:00</span>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="volume-control">
            <button id="queue-button" class="control-button" title="Queue" style="margin-right: 15px;">☰</button>
            <button id="mute-button" class="control-button">🔊</button>
            <div class="volume-slider">
                <div class="volume-fill"></div>
            </div>
        </div>
    </div>

    <!-- Create Playlist Modal -->
    <div id="create-playlist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Playlist</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="playlist-name-input" placeholder="Enter playlist name..." maxlength="50">
                <div class="modal-actions">
                    <button id="cancel-create-playlist" class="btn-secondary">Cancel</button>
                    <button id="confirm-create-playlist" class="btn-primary">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Queue Modal -->
    <div id="queue-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Up Next</h3>
                <span class="close-queue-modal">&times;</span>
            </div>
            <div class="modal-body">
                <ul id="queue-list" class="queue-list" style="list-style: none;">
                    <li style="padding: 10px; color: #888; text-align: center;">Queue is empty</li>
                </ul>
                <div class="modal-actions">
                    <button id="clear-queue-btn" class="btn-secondary">Clear Queue</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add to Playlist Modal -->
    <div id="add-to-playlist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add to Playlist</h3>
                <span class="close-add-to-playlist-modal">&times;</span>
            </div>
            <div class="modal-body">
                <p id="add-to-playlist-song-title">Song Title</p>
                <div class="playlist-selection">
                    <label>Select playlist:</label>
                    <select id="playlist-select">
                        <option value="">Choose a playlist...</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button id="cancel-add-to-playlist" class="btn-secondary">Cancel</button>
                    <button id="confirm-add-to-playlist" class="btn-primary">Add to Playlist</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Results Modal -->
    <div id="search-results-modal" class="modal">
        <div class="modal-content large-modal"> <!-- Add 'large-modal' class in CSS -->
            <div class="modal-header">
                <h3>Search Results</h3>
                <span class="close-search-results-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="search-loading" style="display: none; text-align: center; padding: 20px;">
                    Searching...
                </div>
                <ul id="search-results-list" class="search-results-list">
                    <!-- Results populated here -->
                </ul>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
